name: github pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  MDBOOK_VERSION: 0.5.4
  MDBOOK_PAGETOC_VERSION: 0.3.0
  MDBOOK_OPEN_ON_GH_VERSION: 3.0.0

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6.0.0

      - name: Cache mdBook tools
        id: mdbook-cache
        uses: actions/cache@v6.1.0
        with:
          path: ~/.local/mdbook-tools
          key: mdbook-tools-${{ runner.os }}-${{ runner.arch }}-${{ env.MDBOOK_VERSION }}-${{ env.MDBOOK_PAGETOC_VERSION }}-${{ env.MDBOOK_OPEN_ON_GH_VERSION }}

      - name: Install mdBook tools
        if: steps.mdbook-cache.outputs.cache-hit != 'true'
        run: |
          cargo install --root "$HOME/.local/mdbook-tools" mdbook --version "$MDBOOK_VERSION" --locked
          cargo install --root "$HOME/.local/mdbook-tools" mdbook-pagetoc --version "$MDBOOK_PAGETOC_VERSION" --locked
          cargo install --root "$HOME/.local/mdbook-tools" mdbook-open-on-gh --version "$MDBOOK_OPEN_ON_GH_VERSION" --locked

      - name: Add mdBook tools to PATH
        run: echo "$HOME/.local/mdbook-tools/bin" >> "$GITHUB_PATH"

      - name: Show mdbook version
        run: mdbook --version
      - name: Verify pagetoc installation
        run: mdbook-pagetoc --help
      - name: Show open-on-gh version
        run: mdbook-open-on-gh --version

      - name: Build
        run: mdbook build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ./book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0

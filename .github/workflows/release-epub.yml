name: release epub

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  MDBOOK_VERSION: 0.5.4
  MDBOOK_OPEN_ON_GH_VERSION: 3.0.0
  MDBOOK_EPUB_VERSION: 0.5.4

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Cache mdBook tools
        id: mdbook-cache
        uses: actions/cache@v6.1.0
        with:
          path: ~/.local/mdbook-tools
          key: mdbook-tools-epub-${{ runner.os }}-${{ runner.arch }}-${{ env.MDBOOK_VERSION }}-${{ env.MDBOOK_OPEN_ON_GH_VERSION }}-${{ env.MDBOOK_EPUB_VERSION }}

      - name: Install mdBook tools
        if: steps.mdbook-cache.outputs.cache-hit != 'true'
        run: |
          cargo install --root "$HOME/.local/mdbook-tools" mdbook --version "$MDBOOK_VERSION" --locked
          cargo install --root "$HOME/.local/mdbook-tools" mdbook-open-on-gh --version "$MDBOOK_OPEN_ON_GH_VERSION" --locked
          cargo install --root "$HOME/.local/mdbook-tools" mdbook-epub --version "$MDBOOK_EPUB_VERSION" --locked

      - name: Add mdBook tools to PATH
        run: echo "$HOME/.local/mdbook-tools/bin" >> "$GITHUB_PATH"

      - name: Build EPUB
        run: |
          mdbook-epub --standalone .
          mv "book/大李敖全集.epub" "book/leeao-${GITHUB_REF_NAME}.epub"

      - name: Verify EPUB
        run: |
          epub="book/leeao-${GITHUB_REF_NAME}.epub"
          test -f "$epub"
          test "$(wc -c < "$epub")" -lt 2147483648
          unzip -t "$epub"
          sha256sum "$epub"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EPUB: book/leeao-${{ github.ref_name }}.epub
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$EPUB" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$EPUB" \
              --generate-notes \
              --title "大李敖全集 $GITHUB_REF_NAME"
          fi
